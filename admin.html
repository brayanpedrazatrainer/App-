<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Panel Admin — Brayan Pedraza Trainer</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f0ee;color:#191211}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}
</style>
</head>
<body>
<div id="app"></div>
<script>
const {createClient}=supabase;
const sb=createClient(
  'https://brqojlcdtzmqfurztbnm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJycW9qbGNkdHptcWZ1cnp0Ym5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODU0MzgsImV4cCI6MjA5NzA2MTQzOH0.488ohWs2e33EWQ_J_OFfH7GIypItGKBN7GoR6_ymS_4'
);
const C={pr:'#c7372c',dk:'#710D0B',bk:'#191211',g2:'#94938f',g3:'#d6d7d2',wh:'#fff'};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toISOString().split('T')[0]}

let S={
  view:'login',tab:'clients',loading:false,error:'',
  user:null,clients:[],programs:[],
  selClient:null,selProgram:null,selSession:null,
  clientMeas:[],clientCycle:[],
  pForm:{show:false,name:'',desc:''},
  sForm:{show:false,week:1,day:1,type:'Cuerpo Completo'},
  eForm:{show:false,name:'',muscle:'',sets:3,reps:'8-10',video:''},
};
function set(u){Object.assign(S,u);render()}

// ── RENDER ──────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');if(!app)return;
  if(S.loading){app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:${C.bk}"><div style="text-align:center"><p style="font-size:40px;margin-bottom:10px">👑</p><p style="color:${C.g2};font-size:14px">Cargando...</p></div></div>`;return}
  if(S.view==='login'){app.innerHTML=rLogin();return}
  if(S.view==='no_admin'){app.innerHTML=rNoAdmin();return}
  app.innerHTML=`
    <div style="background:${C.bk};padding:14px 18px;position:sticky;top:0;z-index:20">
      <div style="display:flex;justify-content:space-between;align-items:center;max-width:640px;margin:0 auto">
        <p style="color:${C.wh};font-weight:900;font-size:16px">👑 Panel Admin</p>
        <button onclick="logout()" style="background:rgba(255,255,255,.1);border:none;color:${C.g3};padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600">Salir</button>
      </div>
    </div>
    <div style="display:flex;background:${C.bk};border-top:1px solid #2a2523">
      ${[{k:'clients',l:'👥 Clientas'},{k:'programs',l:'💪 Programas'},{k:'add',l:'➕ Nueva clienta'}].map(t=>`
        <button onclick="set({tab:'${t.k}',selClient:null,selProgram:null,selSession:null,pForm:{show:false,name:'',desc:''},sForm:{show:false,week:1,day:1,type:'Cuerpo Completo'},eForm:{show:false,name:'',muscle:'',sets:3,reps:'8-10',video:''}})"
          style="flex:1;padding:10px 0;font-weight:700;font-size:11px;border:none;background:none;color:${S.tab===t.k?C.pr:C.g2};border-bottom:3px solid ${S.tab===t.k?C.pr:'transparent'}">
          ${t.l}
        </button>`).join('')}
    </div>
    <div style="padding:14px;max-width:640px;margin:0 auto;padding-bottom:40px">
      ${S.tab==='clients'?rClients():S.tab==='programs'?rPrograms():rAddClient()}
    </div>`;
}

function rLogin(){return`
<div style="min-height:100vh;background:${C.bk};display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="background:#231d1c;border-radius:18px;padding:28px 20px;width:100%;max-width:380px;border:1px solid #3a3330">
    <p style="font-size:40px;text-align:center;margin-bottom:12px">👑</p>
    <p style="font-weight:900;font-size:20px;color:${C.wh};text-align:center;margin-bottom:4px">Panel del Entrenador</p>
    <p style="font-size:13px;color:${C.g2};text-align:center;margin-bottom:22px">Brayan Pedraza Trainer</p>
    ${S.error?`<p style="background:#fde8e8;color:${C.pr};border-radius:8px;padding:10px;font-size:13px;margin-bottom:14px;text-align:center">${esc(S.error)}</p>`:''}
    <p style="font-size:12px;color:${C.g2};margin-bottom:5px">Correo</p>
    <input id="le" type="email" placeholder="tu@correo.com"
      style="width:100%;padding:11px 13px;border:2px solid #3a3330;border-radius:10px;font-size:15px;outline:none;margin-bottom:10px;background:#191211;color:${C.wh}"/>
    <p style="font-size:12px;color:${C.g2};margin-bottom:5px">Contraseña</p>
    <input id="lp" type="password" placeholder="••••••••"
      style="width:100%;padding:11px 13px;border:2px solid #3a3330;border-radius:10px;font-size:15px;outline:none;margin-bottom:18px;background:#191211;color:${C.wh}"/>
    <button onclick="doLogin()" style="width:100%;padding:13px;background:${C.pr};color:${C.wh};border:none;border-radius:11px;font-weight:700;font-size:15px">Ingresar</button>
  </div>
</div>`}

function rNoAdmin(){return`
<div style="min-height:100vh;background:${C.bk};display:flex;align-items:center;justify-content:center;padding:20px;text-align:center">
  <div>
    <p style="font-size:40px;margin-bottom:12px">🚫</p>
    <p style="color:${C.wh};font-size:16px;font-weight:700;margin-bottom:8px">Sin acceso de administrador</p>
    <p style="color:${C.g2};font-size:13px;margin-bottom:20px">Esta cuenta no tiene permisos de admin.</p>
    <button onclick="logout()" style="background:${C.pr};color:${C.wh};border:none;border-radius:10px;padding:10px 20px;font-weight:700">Salir</button>
  </div>
</div>`}

// ── CLIENTAS ────────────────────────────────────────────────
function rClients(){
  if(S.selClient)return rClientDetail();
  if(S.clients.length===0)return`<div style="background:${C.wh};border-radius:14px;padding:40px 20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.08)">
    <p style="font-size:36px;margin-bottom:10px">👥</p>
    <p style="font-weight:700;font-size:16px;margin-bottom:4px">Sin clientas aún</p>
    <p style="font-size:13px;color:${C.g2}">Ve a ➕ Nueva clienta para comenzar.</p>
  </div>`;
  return`
    <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:${C.g2};margin-bottom:10px">${S.clients.length} clienta${S.clients.length!==1?'s':''}</p>
    ${S.clients.map(c=>{
      const prog=S.programs.find(p=>p.id===c.prog_id);
      return`<div onclick="openClient('${c.id}')" style="background:${C.wh};border-radius:13px;padding:14px 16px;margin-bottom:10px;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <p style="font-weight:700;font-size:15px">${esc(c.name)}</p>
            <p style="font-size:12px;color:${C.g2};margin-top:2px">${prog?'💪 '+esc(prog.name):'Sin programa asignado'}</p>
          </div>
          <span style="color:${C.g3};font-size:20px">›</span>
        </div>
      </div>`;
    }).join('')}`;
}

function rClientDetail(){
  const c=S.selClient;
  return`
    <button onclick="set({selClient:null,clientMeas:[],clientCycle:[]})" style="background:#f3f4f6;border:none;padding:8px 16px;border-radius:9px;font-weight:700;font-size:13px;margin-bottom:14px">← Volver</button>
    <div style="background:${C.wh};border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <p style="font-weight:900;font-size:18px;margin-bottom:12px">👤 ${esc(c.name)}</p>
      <p style="font-size:12px;color:${C.g2};font-weight:600;margin-bottom:6px">Programa asignado</p>
      <select id="prog-sel" onchange="assignProg('${c.id}',this.value)"
        style="width:100%;padding:10px 12px;border:2px solid ${C.g3};border-radius:10px;font-size:14px;background:${C.wh}">
        <option value="">— Sin programa —</option>
        ${S.programs.map(p=>`<option value="${p.id}" ${p.id===c.prog_id?'selected':''}>${esc(p.name)}</option>`).join('')}
      </select>
    </div>
    ${S.clientMeas.length>0?`
      <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:${C.g2};margin:14px 0 8px">Últimas medidas</p>
      ${S.clientMeas.slice(0,3).map(m=>`
        <div style="background:${C.wh};border-radius:12px;padding:13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.07)">
          <p style="font-weight:700;font-size:13px;margin-bottom:8px">📅 ${m.measurement_date}</p>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
            ${m.pecho?`<div><p style="font-size:10px;color:${C.g2}">Pecho</p><p style="font-weight:700;font-size:14px">${m.pecho}cm</p></div>`:''}
            ${m.cintura?`<div><p style="font-size:10px;color:${C.g2}">Cintura</p><p style="font-weight:700;font-size:14px">${m.cintura}cm</p></div>`:''}
            ${m.gluteo?`<div><p style="font-size:10px;color:${C.g2}">Glúteo</p><p style="font-weight:700;font-size:14px">${m.gluteo}cm</p></div>`:''}
            ${m.fat_pct?`<div><p style="font-size:10px;color:${C.g2}">% Fat</p><p style="font-weight:700;font-size:14px">${m.fat_pct}%</p></div>`:''}
            ${m.muscle_pct?`<div><p style="font-size:10px;color:${C.g2}">% Muscle</p><p style="font-weight:700;font-size:14px">${m.muscle_pct}%</p></div>`:''}
            ${m.body_age?`<div><p style="font-size:10px;color:${C.g2}">Body Age</p><p style="font-weight:700;font-size:14px">${m.body_age}</p></div>`:''}
            ${m.imc?`<div><p style="font-size:10px;color:${C.g2}">IMC</p><p style="font-weight:700;font-size:14px">${m.imc}</p></div>`:''}
            ${m.visceral_fat?`<div><p style="font-size:10px;color:${C.g2}">Visceral Fat</p><p style="font-weight:700;font-size:14px">${m.visceral_fat}</p></div>`:''}
          </div>
          ${m.notes?`<p style="margin-top:8px;font-size:12px;color:${C.g2};font-style:italic">"${esc(m.notes)}"</p>`:''}
        </div>`).join('')}
    `:''}
    ${S.clientCycle.length>0?`
      <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:${C.g2};margin:14px 0 8px">Últimos registros de ciclo</p>
      ${S.clientCycle.slice(0,5).map(cy=>`
        <div style="background:${C.wh};border-radius:12px;padding:12px 14px;margin-bottom:7px;box-shadow:0 1px 4px rgba(0,0,0,.07)">
          <p style="font-size:13px">🌙 Último sangrado: <strong>${cy.last_bleeding_date}</strong></p>
        </div>`).join('')}
    `:''}`;
}

// ── PROGRAMAS ───────────────────────────────────────────────
function rPrograms(){
  if(S.selSession)return rSessionDetail();
  if(S.selProgram)return rProgramDetail();
  return`
    <button onclick="set({pForm:{show:true,name:'',desc:''}})"
      style="width:100%;padding:12px;background:${C.pr};color:${C.wh};border:none;border-radius:11px;font-weight:700;font-size:14px;margin-bottom:14px">
      + Crear nuevo programa
    </button>
    ${S.pForm.show?`
      <div style="background:${C.wh};border-radius:14px;padding:16px;margin-bottom:14px;border:2px solid ${C.pr};box-shadow:0 2px 8px rgba(0,0,0,.1)">
        <p style="font-weight:700;font-size:15px;margin-bottom:12px">Nuevo programa</p>
        <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Nombre del programa</p>
        <input id="pf-name" type="text" placeholder="Ej: Programa Claudia — Mes 1" value="${esc(S.pForm.name)}"
          style="width:100%;padding:10px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none;margin-bottom:10px"/>
        <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Descripción (opcional)</p>
        <input id="pf-desc" type="text" placeholder="Ej: Programa de fuerza 4 semanas" value="${esc(S.pForm.desc)}"
          style="width:100%;padding:10px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none;margin-bottom:12px"/>
        <div style="display:flex;gap:8px">
          <button onclick="saveProgram()" style="flex:1;padding:11px;background:${C.pr};color:${C.wh};border:none;border-radius:10px;font-weight:700;font-size:14px">Guardar</button>
          <button onclick="set({pForm:{show:false,name:'',desc:''}})" style="padding:11px 16px;background:#f3f4f6;color:#374151;border:none;border-radius:10px;font-weight:600;font-size:14px">Cancelar</button>
        </div>
      </div>`:''}
    ${S.programs.length===0?`<div style="background:${C.wh};border-radius:14px;padding:40px 20px;text-align:center"><p style="font-size:36px;margin-bottom:10px">💪</p><p style="font-weight:700;font-size:16px">Sin programas aún</p></div>`:''}
    ${S.programs.map(p=>`
      <div style="background:${C.wh};border-radius:13px;padding:14px 16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div onclick="openProg('${p.id}')" style="flex:1;cursor:pointer">
            <p style="font-weight:700;font-size:15px">${esc(p.name)}</p>
            ${p.description?`<p style="font-size:12px;color:${C.g2};margin-top:2px">${esc(p.description)}</p>`:''}
            <p style="font-size:11px;color:${C.g2};margin-top:3px">${(p.sessions||[]).length} sesiones</p>
          </div>
          <button onclick="delProg('${p.id}')" style="background:#fde8e8;border:none;color:${C.pr};border-radius:8px;padding:7px 10px;font-size:13px;margin-left:10px">🗑</button>
        </div>
      </div>`).join('')}`;
}

function rProgramDetail(){
  const p=S.selProgram;
  const sessions=(p.sessions||[]).sort((a,b)=>a.week_number-b.week_number||a.day_number-b.day_number);
  return`
    <button onclick="set({selProgram:null,sForm:{show:false,week:1,day:1,type:'Cuerpo Completo'}})" style="background:#f3f4f6;border:none;padding:8px 16px;border-radius:9px;font-weight:700;font-size:13px;margin-bottom:14px">← Volver</button>
    <div style="background:${C.wh};border-radius:14px;padding:15px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
      <p style="font-weight:900;font-size:18px">${esc(p.name)}</p>
      ${p.description?`<p style="font-size:13px;color:${C.g2};margin-top:3px">${esc(p.description)}</p>`:''}
    </div>
    <button onclick="set({sForm:{show:true,week:1,day:1,type:'Cuerpo Completo'}})"
      style="width:100%;padding:11px;background:${C.bk};color:${C.wh};border:none;border-radius:10px;font-weight:700;font-size:13px;margin-bottom:12px">
      + Agregar sesión
    </button>
    ${S.sForm.show?`
      <div style="background:${C.wh};border-radius:14px;padding:16px;margin-bottom:12px;border:2px solid ${C.bk}">
        <p style="font-weight:700;font-size:14px;margin-bottom:12px">Nueva sesión</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div>
            <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Semana</p>
            <select id="sf-week" style="width:100%;padding:9px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;background:${C.wh}">
              ${[1,2,3,4].map(n=>`<option value="${n}" ${S.sForm.week===n?'selected':''}>Semana ${n}</option>`).join('')}
            </select>
          </div>
          <div>
            <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Día</p>
            <select id="sf-day" style="width:100%;padding:9px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;background:${C.wh}">
              ${[1,2,3].map(n=>`<option value="${n}" ${S.sForm.day===n?'selected':''}>Día ${n}</option>`).join('')}
            </select>
          </div>
        </div>
        <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Tipo de sesión</p>
        <input id="sf-type" type="text" value="${esc(S.sForm.type)}" placeholder="Ej: Tren Inferior + Core"
          style="width:100%;padding:9px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none;margin-bottom:12px"/>
        <div style="display:flex;gap:8px">
          <button onclick="saveSession('${p.id}')" style="flex:1;padding:10px;background:${C.pr};color:${C.wh};border:none;border-radius:9px;font-weight:700;font-size:13px">Guardar sesión</button>
          <button onclick="set({sForm:{show:false,week:1,day:1,type:'Cuerpo Completo'}})" style="padding:10px 14px;background:#f3f4f6;border:none;border-radius:9px;font-weight:600;font-size:13px">Cancelar</button>
        </div>
      </div>`:''}
    ${sessions.length===0?`<p style="text-align:center;color:${C.g2};padding:20px;font-size:14px">Sin sesiones — agrega la primera</p>`:''}
    ${sessions.map(s=>`
      <div style="background:${C.wh};border-radius:13px;padding:13px 15px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div onclick="openSess('${s.id}')" style="flex:1;cursor:pointer">
            <p style="font-weight:700;font-size:14px">Semana ${s.week_number} · Día ${s.day_number}</p>
            <p style="font-size:12px;color:${C.g2}">${esc(s.session_type)} · ${(s.exercises||[]).length} ejercicios</p>
          </div>
          <button onclick="delSess('${s.id}')" style="background:#fde8e8;border:none;color:${C.pr};border-radius:8px;padding:6px 9px;font-size:12px;margin-left:8px">🗑</button>
        </div>
      </div>`).join('')}`;
}

function rSessionDetail(){
  const s=S.selSession;
  const exs=(s.exercises||[]).sort((a,b)=>a.order_index-b.order_index);
  return`
    <button onclick="set({selSession:null})" style="background:#f3f4f6;border:none;padding:8px 16px;border-radius:9px;font-weight:700;font-size:13px;margin-bottom:14px">← Volver</button>
    <div style="background:${C.bk};border-radius:14px;padding:14px;margin-bottom:12px;color:${C.wh}">
      <p style="font-weight:900;font-size:17px">Semana ${s.week_number} · Día ${s.day_number}</p>
      <p style="font-size:13px;color:${C.g2};margin-top:2px">${esc(s.session_type)}</p>
    </div>
    <button onclick="set({eForm:{show:true,name:'',muscle:'',sets:3,reps:'8-10',video:''}})"
      style="width:100%;padding:11px;background:${C.pr};color:${C.wh};border:none;border-radius:10px;font-weight:700;font-size:13px;margin-bottom:12px">
      + Agregar ejercicio
    </button>
    ${S.eForm.show?`
      <div style="background:${C.wh};border-radius:14px;padding:16px;margin-bottom:12px;border:2px solid ${C.pr}">
        <p style="font-weight:700;font-size:14px;margin-bottom:12px">Nuevo ejercicio</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
          <div style="grid-column:1/-1">
            <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Nombre del ejercicio</p>
            <input id="ef-name" type="text" placeholder="Ej: Hip Thrust" value="${esc(S.eForm.name)}"
              style="width:100%;padding:9px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none"/>
          </div>
          <div style="grid-column:1/-1">
            <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Grupo muscular</p>
            <input id="ef-muscle" type="text" placeholder="Ej: Glúteos" value="${esc(S.eForm.muscle)}"
              style="width:100%;padding:9px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none"/>
          </div>
          <div>
            <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Series</p>
            <input id="ef-sets" type="number" value="${S.eForm.sets}" min="1" max="10"
              style="width:100%;padding:9px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none"/>
          </div>
          <div>
            <p style="font-size:12px;color:${C.g2};margin-bottom:4px">Repeticiones</p>
            <input id="ef-reps" type="text" placeholder="Ej: 10-12" value="${esc(S.eForm.reps)}"
              style="width:100%;padding:9px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none"/>
          </div>
          <div style="grid-column:1/-1">
            <p style="font-size:12px;color:${C.g2};margin-bottom:4px">URL video YouTube (opcional)</p>
            <input id="ef-video" type="url" placeholder="https://youtube.com/watch?v=..." value="${esc(S.eForm.video)}"
              style="width:100%;padding:9px 12px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none"/>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button onclick="saveExercise('${s.id}')" style="flex:1;padding:10px;background:${C.pr};color:${C.wh};border:none;border-radius:9px;font-weight:700;font-size:13px">Guardar ejercicio</button>
          <button onclick="set({eForm:{show:false,name:'',muscle:'',sets:3,reps:'8-10',video:''}})" style="padding:10px 14px;background:#f3f4f6;border:none;border-radius:9px;font-weight:600;font-size:13px">Cancelar</button>
        </div>
      </div>`:''}
    ${exs.length===0?`<p style="text-align:center;color:${C.g2};padding:20px;font-size:14px">Sin ejercicios — agrega el primero</p>`:''}
    ${exs.map((ex,i)=>`
      <div style="background:${C.wh};border-radius:13px;padding:13px;margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
        <div style="display:flex;gap:10px">
          <div style="width:30px;height:30px;border-radius:8px;background:#fde8e8;color:${C.dk};display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0">${i+1}</div>
          <div style="flex:1">
            <p style="font-weight:700;font-size:14px;margin-bottom:2px">${esc(ex.name)}</p>
            <p style="font-size:12px;color:${C.g2};margin-bottom:8px">${esc(ex.muscle_group)} · ${ex.sets_count}×${esc(ex.reps_range)}</p>
            <div style="display:flex;gap:6px;align-items:center">
              <input type="url" value="${esc(ex.video_url||'')}" placeholder="URL video YouTube..."
                onchange="updateVideo('${ex.id}','${s.id}',this.value)"
                style="flex:1;padding:7px 10px;border:1.5px solid ${C.g3};border-radius:8px;font-size:12px;outline:none;color:#191211"/>
              ${ex.video_url?`<a href="${esc(ex.video_url)}" target="_blank" style="color:${C.pr};font-size:12px;text-decoration:none;font-weight:700;background:#fde8e8;padding:6px 10px;border-radius:7px">▶</a>`:''}
            </div>
          </div>
          <button onclick="delEx('${ex.id}','${s.id}')" style="background:#fde8e8;border:none;color:${C.pr};border-radius:8px;padding:6px 8px;font-size:11px;align-self:flex-start">🗑</button>
        </div>
      </div>`).join('')}`;
}

// ── ADD CLIENT ──────────────────────────────────────────────
function rAddClient(){return`
  <div style="background:${C.wh};border-radius:14px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.08)">
    <p style="font-weight:900;font-size:17px;margin-bottom:4px">➕ Agregar clienta</p>
    <p style="font-size:13px;color:${C.g2};margin-bottom:16px;line-height:1.6">Crea la cuenta desde el dashboard de Supabase y luego asígnale un programa aquí.</p>
    <div style="background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:14px;margin-bottom:16px">
      <p style="font-weight:700;font-size:13px;color:#b45309;margin-bottom:8px">📋 Cómo agregar una clienta:</p>
      <ol style="font-size:13px;color:#78350f;line-height:2.2;padding-left:18px">
        <li>Ve a <strong>supabase.com</strong> → tu proyecto</li>
        <li>Clic en <strong>Authentication → Users</strong></li>
        <li>Clic en <strong>"Add user" → "Create new user"</strong></li>
        <li>Ingresa el correo y una contraseña temporal</li>
        <li>En <em>User metadata</em> escribe: <code style="background:#fef3c7;padding:2px 6px;border-radius:4px;font-size:12px">{"name":"Nombre de la clienta"}</code></li>
        <li>Guarda y vuelve aquí → pestaña 👥 Clientas</li>
        <li>Asígnale el programa desde su perfil</li>
      </ol>
    </div>
    <button onclick="loadData()" style="width:100%;padding:11px;background:${C.bk};color:${C.wh};border:none;border-radius:10px;font-weight:700;font-size:13px">
      🔄 Actualizar lista
    </button>
  </div>`}

// ── ACTIONS ─────────────────────────────────────────────────
async function doLogin(){
  const email=document.getElementById('le')?.value;
  const pass=document.getElementById('lp')?.value;
  if(!email||!pass){set({error:'Completa todos los campos'});return}
  set({loading:true,error:''});
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){set({loading:false,error:'Correo o contraseña incorrectos'});return}
  const {data:prof}=await sb.from('profiles').select('*').eq('id',data.user.id).single();
  if(!prof?.is_admin){await sb.auth.signOut();set({loading:false,view:'no_admin'});return}
  S.user=data.user;
  await loadData();
}

async function loadData(){
  set({loading:true});
  const [cr,pr]=await Promise.all([
    sb.from('profiles').select('*, client_programs(program_id)').eq('is_admin',false),
    sb.from('programs').select('*, sessions(*, exercises(*))').order('created_at'),
  ]);
  const clients=(cr.data||[]).map(c=>({...c,prog_id:c.client_programs?.[0]?.program_id||null}));
  set({loading:false,view:'main',clients,programs:pr.data||[]});
}

async function openClient(id){
  const c=S.clients.find(x=>x.id===id);
  set({loading:true});
  const [mr,cyc]=await Promise.all([
    sb.from('measurements').select('*').eq('client_id',id).order('measurement_date',{ascending:false}).limit(5),
    sb.from('cycle_logs').select('*').eq('client_id',id).order('created_at',{ascending:false}).limit(5),
  ]);
  set({loading:false,selClient:c,clientMeas:mr.data||[],clientCycle:cyc.data||[]});
}

async function assignProg(clientId,progId){
  if(!progId){await sb.from('client_programs').delete().eq('client_id',clientId);}
  else{await sb.from('client_programs').upsert({client_id:clientId,program_id:progId},{onConflict:'client_id,program_id'});}
  S.selClient={...S.selClient,prog_id:progId};
  await loadData();
  set({selClient:{...S.selClient,prog_id:progId}});
}

function openProg(id){const p=S.programs.find(x=>x.id===id);if(p)set({selProgram:p})}

function openSess(id){
  for(const p of S.programs){const s=(p.sessions||[]).find(x=>x.id===id);if(s){set({selSession:s});return}}
}

async function saveProgram(){
  const name=document.getElementById('pf-name')?.value?.trim();
  const desc=document.getElementById('pf-desc')?.value?.trim()||'';
  if(!name)return;
  set({loading:true});
  await sb.from('programs').insert({name,description:desc});
  await loadData();
  set({pForm:{show:false,name:'',desc:''}});
}

async function delProg(id){
  if(!confirm('¿Eliminar este programa y todas sus sesiones?'))return;
  set({loading:true});
  await sb.from('programs').delete().eq('id',id);
  await loadData();
}

async function saveSession(progId){
  const week=parseInt(document.getElementById('sf-week')?.value||1);
  const day=parseInt(document.getElementById('sf-day')?.value||1);
  const type=document.getElementById('sf-type')?.value?.trim()||'Cuerpo Completo';
  set({loading:true});
  await sb.from('sessions').insert({program_id:progId,week_number:week,day_number:day,session_type:type});
  await loadData();
  const updProg=S.programs.find(p=>p.id===progId);
  set({selProgram:updProg,sForm:{show:false,week:1,day:1,type:'Cuerpo Completo'}});
}

async function delSess(id){
  if(!confirm('¿Eliminar esta sesión y sus ejercicios?'))return;
  const progId=S.selProgram?.id;
  set({loading:true});
  await sb.from('sessions').delete().eq('id',id);
  await loadData();
  const updProg=S.programs.find(p=>p.id===progId);
  set({selProgram:updProg,selSession:null});
}

async function saveExercise(sessId){
  const name=document.getElementById('ef-name')?.value?.trim();
  const muscle=document.getElementById('ef-muscle')?.value?.trim()||'';
  const sets=parseInt(document.getElementById('ef-sets')?.value||3);
  const reps=document.getElementById('ef-reps')?.value?.trim()||'8-10';
  const video=document.getElementById('ef-video')?.value?.trim()||'';
  if(!name)return;
  set({loading:true});
  await sb.from('exercises').insert({session_id:sessId,name,muscle_group:muscle,sets_count:sets,reps_range:reps,video_url:video,order_index:Date.now()});
  await loadData();
  for(const p of S.programs){const s=(p.sessions||[]).find(x=>x.id===sessId);if(s){set({selSession:s,eForm:{show:false,name:'',muscle:'',sets:3,reps:'8-10',video:''}});return}}
}

async function updateVideo(exId,sessId,url){
  await sb.from('exercises').update({video_url:url}).eq('id',exId);
  await loadData();
  for(const p of S.programs){const s=(p.sessions||[]).find(x=>x.id===sessId);if(s){S.selSession=s;render();return}}
}

async function delEx(exId,sessId){
  if(!confirm('¿Eliminar este ejercicio?'))return;
  set({loading:true});
  await sb.from('exercises').delete().eq('id',exId);
  await loadData();
  for(const p of S.programs){const s=(p.sessions||[]).find(x=>x.id===sessId);if(s){set({selSession:s});return}}
}

async function logout(){
  await sb.auth.signOut();
  set({view:'login',user:null,clients:[],programs:[],selClient:null,selProgram:null,selSession:null,error:''});
}

// Globals
window.set=set;window.doLogin=doLogin;window.logout=logout;window.loadData=loadData;
window.openClient=openClient;window.assignProg=assignProg;window.openProg=openProg;window.openSess=openSess;
window.saveProgram=saveProgram;window.delProg=delProg;window.saveSession=saveSession;window.delSess=delSess;
window.saveExercise=saveExercise;window.updateVideo=updateVideo;window.delEx=delEx;

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){S.user=session.user;await loadData();}
  else render();
}
init();
</script>
</body>
</html>
