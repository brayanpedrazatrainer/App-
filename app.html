<div id="app"></div>
<script>

const sb=createClient(
  'https://brqojlcdtzmqfurztbnm.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJycW9qbGNkdHptcWZ1cnp0Ym5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0ODU0MzgsImV4cCI6MjA5NzA2MTQzOH0.488ohWs2e33EWQ_J_OFfH7GIypItGKBN7GoR6_ymS_4'
);
const C={pr:'#c7372c',dk:'#710D0B',bk:'#191211',g2:'#94938f',g3:'#d6d7d2',bg:'#ECEAE8',wh:'#FFFFFF',td:'#191211',tm:'#4a4743',tl:'#94938f'};
const PHASES=[
  {k:'menstrual',l:'Menstrual',r:[1,5],e:'🌑',tip:'Descanso activo — movilidad y respiración',tr:'Movilidad, yoga suave, estiramientos profundos',c:'#be185d',bg:'#fdf2f8',br:'#f9a8d4'},
  {k:'folicular',l:'Folicular',r:[6,13],e:'🌓',tip:'Energía en aumento — ideal para nuevos retos',tr:'Fuerza progresiva, coordinación, aprendizaje motor',c:'#1d4ed8',bg:'#eff6ff',br:'#93c5fd'},
  {k:'ovulatoria',l:'Ovulatoria',r:[14,16],e:'🌕',tip:'Pico de rendimiento — máxima intensidad',tr:'Alta intensidad, potencia, desafíos motores',c:'#b45309',bg:'#fffbeb',br:'#fcd34d'},
  {k:'lutea',l:'Lútea',r:[17,28],e:'🌗',tip:'Energía descendente — consistencia sin sobreexigir',tr:'Fuerza moderada, pilates, estabilidad',c:'#7c3aed',bg:'#f5f3ff',br:'#c4b5f8'},
];
const SYMPTOMS=[
  {k:'calores',l:'Calores',e:'🔥'},{k:'sudores',l:'Sudores nocturnos',e:'💧'},{k:'sueno',l:'Mal sueño',e:'😴'},
  {k:'animo',l:'Cambios de ánimo',e:'💭'},{k:'fatiga',l:'Fatiga',e:'⚡'},{k:'articular',l:'Dolor articular',e:'🦴'},
  {k:'cabeza',l:'Dolor de cabeza',e:'🤕'},{k:'irritabilidad',l:'Irritabilidad',e:'😤'},{k:'bien',l:'Sin síntomas',e:'✨'},
];
const MF=[
  {k:'edad',l:'Años',u:'años'},{k:'altura',l:'Altura',u:'cm'},{k:'pecho',l:'Pecho',u:'cm'},
  {k:'cintura',l:'Cintura',u:'cm'},{k:'gluteo',l:'Glúteo',u:'cm'},{k:'imc',l:'IMC',u:''},
  {k:'bmi',l:'BMI',u:''},{k:'fat_pct',l:'% Fat',u:'%'},{k:'muscle_pct',l:'% Muscle',u:'%'},
  {k:'rm_kcal',l:'RM kcal',u:'kcal'},{k:'body_age',l:'Body Age',u:'años'},{k:'visceral_fat',l:'Visceral Fat',u:''},
];
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function today(){return new Date().toISOString().split('T')[0]}
function fmtDate(iso){if(!iso)return '';return new Date(iso).toLocaleDateString('es-CO',{day:'numeric',month:'short',year:'numeric'})}
function getCycleDay(d){if(!d)return null;return Math.floor((Date.now()-new Date(d))/86400000)+5}
function getPhase(day,len){if(!day||day<1)return null;const d=((day-1)%(len||28))+1;return PHASES.find(p=>d>=p.r[0]&&d<=p.r[1])||PHASES[3]}
function ytId(url){if(!url)return null;const m=url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([^&?\/\s]{11})/);return m?m[1]:null}

let S={
  view:'login',tab:'ciclo',loading:false,error:'',
  user:null,profile:null,prog:null,PROG:[],week:0,
  sessW:-1,sessI:-1,vidW:-1,vidS:-1,vidE:-1,completions:{},
  cycleLen:28,lastBleeding:null,cycleHistory:[],
  symLog:{},menoLog:{},selSym:[],symNote:'',
  meas:[],expM:null,mf:{},md:'',mn:'',
};
function set(u){Object.assign(S,u);render()}

const btnR=(t,fn)=>`<button onclick="${fn}" style="width:100%;padding:12px 16px;background:${C.pr};color:#fff;border:none;border-radius:11px;font-weight:700;font-size:14px">${t}</button>`;
const card=(i,s='')=>`<div style="background:${C.wh};border-radius:14px;padding:15px;box-shadow:0 1px 4px rgba(25,18,17,.09);${s}">${i}</div>`;
const secT=(t)=>`<p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:${C.tl};margin:18px 0 8px">${t}</p>`;

function render(){
  const app=document.getElementById('app');if(!app)return;
  if(S.loading){app.innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:${C.bk}"><div style="text-align:center"><p style="font-size:40px;margin-bottom:10px">👑</p><p style="color:${C.g2};font-size:14px">Cargando...</p></div></div>`;return}
  if(S.view==='login'){app.innerHTML=rLogin();return}
  if(S.view==='no_prog'){app.innerHTML=rNoProg();return}
  const tabs=[{k:'ciclo',e:'🌙',l:'Ciclo'},{k:'rutinas',e:'💪',l:'Rutinas'},{k:'medidas',e:'📏',l:'Medidas'}];
  app.innerHTML=`
    <div style="background:${C.bk};padding:15px 18px 13px;position:sticky;top:0;z-index:20">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <p style="color:#fff;font-weight:900;font-size:17px;margin:0">👑 ${S.profile&&S.profile.name?'Hola, '+esc(S.profile.name)+'!':'Mi App'}</p>
          <p style="color:${C.g2};font-size:10px;text-transform:uppercase;letter-spacing:.1em;margin:2px 0 0">Entrenamiento &amp; Seguimiento</p>
        </div>
        <button onclick="doLogout()" style="background:rgba(255,255,255,.08);border:none;color:${C.g3};padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600">Salir</button>
      </div>
    </div>
    ${S.view==='main'
      ?`<div style="display:flex;background:${C.bk};border-top:1px solid #2a2523;position:sticky;top:62px;z-index:20">
          ${tabs.map(t=>`<button onclick="set({tab:'${t.k}'})" style="flex:1;padding:9px 0 10px;font-weight:700;font-size:11px;border:none;background:none;color:${S.tab===t.k?C.pr:C.g2};border-bottom:3px solid ${S.tab===t.k?C.pr:'transparent'}">${t.e} ${t.l}</button>`).join('')}
        </div>`
      :`<div style="background:${C.bk};padding:10px 14px 12px;border-top:1px solid #2a2523">
          <button onclick="goBack()" style="background:rgba(255,255,255,.08);border:none;padding:7px 14px;border-radius:9px;font-weight:700;font-size:12px;color:${C.g3}">← Volver</button>
        </div>`}
    <div style="padding:13px 13px 50px">
      ${S.view==='main'&&S.tab==='ciclo'?rCiclo()
       :S.view==='main'&&S.tab==='rutinas'?rRutinas()
       :S.view==='main'&&S.tab==='medidas'?rMedidas()
       :S.view==='pform'?rPForm()
       :S.view==='sform'?rSForm()
       :S.view==='menoform'?rMenoForm()
       :S.view==='sess'?rSess()
       :S.view==='vid'?rVid()
       :S.view==='mform'?rMForm():''}
    </div>`;
  if(S.view==='main'&&S.tab==='ciclo'){
    const sl=document.getElementById('clen');
    if(sl)sl.oninput=async function(e){S.cycleLen=+e.target.value;const d=document.getElementById('clend');if(d)d.textContent=e.target.value+'d';await saveCycleLen(+e.target.value)};
  }
}

function rLogin(){return `
<div style="min-height:100vh;background:${C.bk};display:flex;align-items:center;justify-content:center;padding:20px">
  <div style="background:#231d1c;border-radius:18px;padding:28px 20px;width:100%;max-width:380px;border:1px solid #3a3330;text-align:center">
    <p style="font-size:48px;margin-bottom:12px">👑</p>
    <p style="font-weight:900;font-size:22px;color:#fff;margin-bottom:5px">Bienvenida!</p>
    <p style="font-size:14px;color:${C.g2};margin-bottom:22px;line-height:1.7">Reina, he configurado esta app especialmente para ti.</p>
    ${S.error?`<p style="background:#fde8e8;color:${C.pr};border-radius:8px;padding:10px;font-size:13px;margin-bottom:14px">${esc(S.error)}</p>`:''}
    <input id="le" type="email" placeholder="Tu correo..." style="width:100%;padding:11px 13px;border:2px solid #3a3330;border-radius:10px;font-size:15px;outline:none;margin-bottom:10px;background:#191211;color:#fff"/>
    <input id="lp" type="password" placeholder="Tu contraseña..." style="width:100%;padding:11px 13px;border:2px solid #3a3330;border-radius:10px;font-size:15px;outline:none;margin-bottom:16px;background:#191211;color:#fff"/>
    <button onclick="doLogin()" style="width:100%;padding:13px;background:${C.pr};color:#fff;border:none;border-radius:11px;font-weight:700;font-size:15px">Ingresar</button>
  </div>
</div>`}

function rNoProg(){return `
<div style="min-height:100vh;background:${C.bg};display:flex;align-items:center;justify-content:center;padding:20px;text-align:center">
  <div>
    <p style="font-size:40px;margin-bottom:12px">⏳</p>
    <p style="font-weight:800;font-size:17px;color:${C.td};margin-bottom:6px">Sin programa asignado aún</p>
    <p style="font-size:14px;color:${C.tl};line-height:1.6">Tu entrenador está preparando tu programa personalizado.</p>
    <button onclick="doLogout()" style="margin-top:20px;background:#f3f4f6;border:none;border-radius:10px;padding:10px 20px;font-weight:600;font-size:13px">Cerrar sesión</button>
  </div>
</div>`}

function rCiclo(){
  const day=getCycleDay(S.lastBleeding),ph=getPhase(day,S.cycleLen),ts=S.symLog[today()],tm=S.menoLog[today()];
  let h='';
  if(ph){h+=`<div style="border-radius:14px;padding:15px;background:${ph.bg};border:1px solid ${ph.br}">
    <p style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:${ph.c};margin-bottom:3px">Día ~${day} del ciclo</p>
    <p style="font-size:22px;font-weight:900;color:${ph.c};margin-bottom:6px">${ph.e} Fase ${ph.l}</p>
    <p style="font-size:13px;color:#4a5568;line-height:1.5;margin-bottom:10px">${ph.tip}</p>
    <div style="background:rgba(255,255,255,.7);border-radius:9px;padding:9px 12px">
      <p style="font-size:12px;font-weight:600;color:${ph.c};margin:0">💪 <span style="font-weight:400;color:#374151">${ph.tr}</span></p>
    </div>
  </div>`;}
  else{h+=card(`<div style="text-align:center;padding:18px 0"><p style="font-size:34px;margin-bottom:10px">🌙</p><p style="font-weight:800;font-size:16px;color:${C.td};margin-bottom:4px">¡Bienvenida, Reina!</p><p style="font-size:13px;color:${C.tl}">Registra el último día de tu sangrado para ver tu fase.</p></div>`);}
  h+=`<div style="display:flex;gap:8px;margin-top:12px">
    <button onclick="set({view:'pform'})" style="flex:1;padding:11px 6px;background:${C.pr};color:#fff;border:none;border-radius:11px;font-weight:700;font-size:12px">🌙 Mi sangrado</button>
    <button onclick="set({view:'sform',selSym:[],symNote:''})" style="flex:1;padding:11px 6px;background:${C.wh};color:${C.pr};border:2px solid ${C.pr};border-radius:11px;font-weight:700;font-size:12px">📋 Síntomas</button>
    <button onclick="set({view:'menoform'})" style="flex:1;padding:11px 6px;background:${C.bk};color:${C.wh};border:none;border-radius:11px;font-weight:700;font-size:12px">👑 Bienestar</button>
  </div>`;
  if(ts&&ts.symptoms&&ts.symptoms.length>0){h+=secT('Síntomas de hoy');h+=card(`<div style="display:flex;flex-wrap:wrap;gap:6px">${ts.symptoms.map(function(k){const s=SYMPTOMS.find(function(x){return x.k===k});return s?`<span style="background:#f5f0fd;color:#7c3aed;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700">${s.e} ${s.l}</span>`:''}).join('')}</div>${ts.notes?`<p style="margin-top:8px;font-size:12px;color:${C.tl};font-style:italic">"${esc(ts.notes)}"</p>`:''}`)}
  if(tm){h+=secT('Bienestar de hoy');h+=card(`${tm.energia?`<p style="font-size:12px;color:${C.tl};margin-bottom:2px">⚡ Energía</p><p style="font-size:13px;color:${C.td};margin-bottom:10px">${esc(tm.energia)}</p>`:''}${tm.sueno?`<p style="font-size:12px;color:${C.tl};margin-bottom:2px">😴 Sueño</p><p style="font-size:13px;color:${C.td};margin-bottom:10px">${esc(tm.sueno)}</p>`:''}${tm.emocional?`<p style="font-size:12px;color:${C.tl};margin-bottom:2px">💭 Emocional</p><p style="font-size:13px;color:${C.td}">${esc(tm.emocional)}</p>`:''}${tm.tratamiento?`<p style="font-size:12px;color:${C.tl};margin-top:8px;margin-bottom:2px">💊 Tratamiento</p><p style="font-size:13px;color:${C.td}">${esc(tm.tratamiento)}</p>`:''}`)}
  h+=secT('Guía de fases');
  PHASES.forEach(function(p){h+=`<div style="background:${C.wh};border-radius:13px;padding:13px;border:1px solid ${p.br};margin-bottom:8px;box-shadow:0 1px 3px rgba(25,18,17,.07)"><div style="display:flex;gap:10px"><span style="font-size:26px;line-height:1">${p.e}</span><div><div style="display:flex;align-items:baseline;gap:7px;margin-bottom:2px"><span style="font-weight:800;font-size:13px;color:${p.c}">${p.l}</span><span style="font-size:11px;color:${C.tl}">Días ${p.r[0]}–${p.r[1]}</span></div><p style="font-size:12px;color:${C.tm};line-height:1.5;margin:0">${p.tip}</p></div></div></div>`});
  h+=secT('Duración de mi ciclo');
  h+=card(`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><p style="font-size:13px;color:${C.tl};margin:0">Días promedio</p><span id="clend" style="font-size:21px;font-weight:900;color:${C.pr}">${S.cycleLen}d</span></div><input type="range" id="clen" min="20" max="45" value="${S.cycleLen}"/><p style="font-size:11px;color:${C.g2};margin-top:6px">En perimenopausia los ciclos pueden variar mucho.</p>`);
  if(S.cycleHistory.length>0){h+=secT('Historial de sangrado');h+=`<div style="display:flex;flex-direction:column;gap:7px">${S.cycleHistory.slice(0,8).map(function(cy,i){return`<div style="background:${C.wh};border-radius:11px;padding:11px 14px;${i===0?'border:2px solid '+C.pr:''};box-shadow:0 1px 3px rgba(25,18,17,.07)"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:13px;color:${C.td}">🌙 Último día: ${fmtDate(cy.last_bleeding_date)}</span>${i===0?'<span style="font-size:11px;font-weight:700;background:#fde8e8;color:'+C.pr+';border-radius:20px;padding:3px 10px">Reciente</span>':''}</div></div>`}).join('')}</div>`}
  return h;
}

function rPForm(){return `
<div style="background:${C.wh};border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(25,18,17,.1)">
  <p style="font-weight:900;font-size:18px;color:${C.td};margin-bottom:4px">🌙 Registrar sangrado</p>
  <p style="font-size:13px;color:${C.tl};margin-bottom:14px;line-height:1.6">¿Cuál fue el último día que tuviste sangrado?</p>
  <input type="date" id="pd-in" value="${today()}" max="${today()}" style="width:100%;padding:11px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:15px;outline:none;margin-bottom:16px;color:${C.td}"/>
  ${btnR('Guardar','saveBleeding()')}
</div>`}

function rSForm(){return `
<div style="background:${C.wh};border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(25,18,17,.1)">
  <p style="font-weight:900;font-size:18px;color:${C.td};margin-bottom:14px">¿Cómo te sientes hoy?</p>
  <div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px">
    ${SYMPTOMS.map(function(s){const sel=S.selSym.includes(s.k);return`<button onclick="tSym('${s.k}')" style="padding:7px 12px;border-radius:20px;font-size:12px;border:2px solid ${sel?C.pr:C.g3};background:${sel?'#fde8e8':C.bg};color:${sel?C.pr:C.tm};font-weight:${sel?700:400}">${s.e} ${s.l}</button>`}).join('')}
  </div>
  <textarea id="sn-in" placeholder="Notas adicionales..." style="width:100%;padding:9px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:13px;resize:none;min-height:60px;outline:none;margin-bottom:14px;color:${C.td}">${esc(S.symNote)}</textarea>
  <button onclick="saveSym()" ${S.selSym.length===0?'disabled':''} style="width:100%;padding:12px;background:${S.selSym.length===0?C.g3:C.pr};color:#fff;border:none;border-radius:11px;font-weight:700;font-size:14px">Guardar síntomas</button>
</div>`}

function rMenoForm(){
  const prev=S.menoLog[today()]||{};
  return `<div style="background:${C.wh};border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(25,18,17,.1)">
  <p style="font-weight:900;font-size:18px;color:${C.td};margin-bottom:4px">👑 Bienestar de hoy</p>
  <p style="font-size:12px;color:${C.tl};margin-bottom:16px">Perimenopausia &amp; Menopausia</p>
  <p style="font-size:13px;font-weight:700;color:${C.td};margin-bottom:5px">⚡ ¿Cómo describes tu nivel de energía esta semana?</p>
  <textarea id="mq1" placeholder="Cuéntame cómo te has sentido con tu energía..." style="width:100%;padding:10px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:13px;resize:none;min-height:72px;outline:none;margin-bottom:12px;color:${C.td}">${esc(prev.energia||'')}</textarea>
  <p style="font-size:13px;font-weight:700;color:${C.td};margin-bottom:5px">😴 ¿Cómo has dormido esta semana?</p>
  <textarea id="mq2" placeholder="Cuéntame sobre tu sueño..." style="width:100%;padding:10px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:13px;resize:none;min-height:72px;outline:none;margin-bottom:12px;color:${C.td}">${esc(prev.sueno||'')}</textarea>
  <p style="font-size:13px;font-weight:700;color:${C.td};margin-bottom:5px">💭 ¿Cómo describes tu estado emocional esta semana?</p>
  <textarea id="mq3" placeholder="Cuéntame cómo te has sentido emocionalmente..." style="width:100%;padding:10px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:13px;resize:none;min-height:72px;outline:none;margin-bottom:12px;color:${C.td}">${esc(prev.emocional||'')}</textarea>
  <p style="font-size:13px;font-weight:700;color:${C.td};margin-bottom:5px">💊 ¿Estás recibiendo algún tratamiento hormonal o médico?</p>
  <textarea id="mtrat" placeholder="Nombre del tratamiento o escribe 'ninguno'..." style="width:100%;padding:10px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:13px;resize:none;min-height:60px;outline:none;margin-bottom:14px;color:${C.td}">${esc(prev.tratamiento||'')}</textarea>
  ${btnR('Guardar','saveMeno()')}
</div>`}

function rRutinas(){
  if(!S.PROG||S.PROG.length===0)return card(`<div style="text-align:center;padding:24px 0"><p style="font-size:36px;margin-bottom:10px">⏳</p><p style="font-weight:700;font-size:15px;color:${C.td};margin-bottom:4px">Sin programa aún</p><p style="font-size:13px;color:${C.tl}">Tu entrenador asignará tu programa pronto.</p></div>`,'margin-top:4px');
  const wk=Math.min(S.week,S.PROG.length-1);
  const sessions=S.PROG[wk]||[];
  let h=`<div style="display:flex;gap:6px;margin-bottom:6px">
    ${S.PROG.map(function(_,w){return`<button onclick="set({week:${w}})" style="flex:1;padding:9px 0;border-radius:10px;font-weight:700;font-size:13px;border:2px solid ${S.week===w?C.pr:C.g3};background:${S.week===w?C.pr:C.wh};color:${S.week===w?C.wh:C.tl}">S${w+1}</button>`}).join('')}
  </div>
  <p style="font-size:11px;color:${C.tl};margin-bottom:13px">Semana ${wk+1} · ${sessions.length} sesiones</p>`;
  sessions.forEach(function(sess,si){
    const pct=sPct(sess);
    h+=`<div onclick="set({view:'sess',sessW:${wk},sessI:${si}})" style="background:${C.wh};border-radius:14px;padding:15px;margin-bottom:10px;cursor:pointer;border:2px solid ${pct===100?C.dk:'transparent'};box-shadow:0 1px 5px rgba(25,18,17,.08)">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px">
        <div><p style="font-weight:800;font-size:17px;color:${C.td};margin-bottom:2px">${esc(sess.day)}</p><p style="font-size:12px;color:${C.tl}">${esc(sess.type)}</p></div>
        <p style="font-size:22px;font-weight:900;color:${pct===100?C.dk:C.pr}">${pct}%</p>
      </div>
      <div style="height:5px;border-radius:3px;background:${C.g3};overflow:hidden"><div style="height:100%;width:${pct}%;background:${pct===100?C.dk:C.pr};border-radius:3px"></div></div>
    </div>`;
  });
  return h;
}

function sPct(sess){
  let t=0,d=0;
  (sess.ex||[]).forEach(function(ex){for(let i=0;i<ex.sets;i++){t++;if(S.completions[ex.eid+'_'+i])d++;}});
  return t===0?0:Math.round((d/t)*100);
}

function rSess(){
  const weeks=S.PROG;if(!weeks||weeks.length===0)return '';
  const sess=weeks[S.sessW]&&weeks[S.sessW][S.sessI];if(!sess)return '';
  const dc=(sess.ex||[]).filter(function(ex){return Array.from({length:ex.sets},function(_,i){return S.completions[ex.eid+'_'+i]}).every(Boolean)}).length;
  let h=`<div style="background:${C.bk};border-radius:14px;padding:15px;margin-bottom:13px;color:#fff;border:1px solid #2a2523">
    <p style="font-weight:900;font-size:18px;margin-bottom:2px">${esc(sess.day)} · Semana ${S.sessW+1}</p>
    <p style="font-size:12px;color:${C.g2};margin-bottom:2px">${esc(sess.type)}</p>
    <p style="font-size:11px;color:${C.pr};font-weight:600">${dc}/${(sess.ex||[]).length} ejercicios completados</p>
  </div>`;
  (sess.ex||[]).forEach(function(ex,idx){
    const allD=Array.from({length:ex.sets},function(_,i){return S.completions[ex.eid+'_'+i]}).every(Boolean);
    h+=`<div id="ec-${ex.eid}" style="background:${allD?'#1a0a09':C.wh};border-radius:14px;padding:13px;margin-bottom:8px;border:2px solid ${allD?C.pr:'transparent'};box-shadow:0 1px 4px rgba(25,18,17,.08)">
      <div style="display:flex;gap:11px">
        <div id="nb-${ex.eid}" style="width:33px;height:33px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;background:${allD?C.pr:'#fde8e8'};color:${allD?C.wh:C.dk}">${allD?'✓':idx+1}</div>
        <div style="flex:1">
          <p style="font-weight:700;font-size:14px;color:${allD?C.wh:C.td};margin-bottom:2px">${esc(ex.n)}</p>
          <p style="font-size:11px;color:${allD?C.g2:C.tl};margin-bottom:9px">${esc(ex.m)} · ${ex.sets}×${esc(ex.reps)} reps · 60s</p>
          <div style="display:flex;gap:6px;margin-bottom:9px">
            ${Array.from({length:ex.sets},function(_,i){const d=S.completions[ex.eid+'_'+i];return`<button id="sb-${ex.eid}-${i}" onclick="tSet('${ex.eid}',${i},${ex.sets})" style="width:37px;height:37px;border-radius:8px;font-weight:700;font-size:12px;border:2px solid ${d?C.pr:C.g3};background:${d?C.pr:C.wh};color:${d?C.wh:C.tl}">${d?'✓':'S'+(i+1)}</button>`}).join('')}
          </div>
          <button onclick="set({view:'vid',vidW:${S.sessW},vidS:${S.sessI},vidE:${idx}})" style="background:${C.bk};color:${C.g3};border:1px solid #3a3330;border-radius:8px;padding:6px 13px;font-size:12px;font-weight:600">▶ Ver demostración</button>
        </div>
      </div>
    </div>`;
  });
  return h;
}

function rVid(){
  const weeks=S.PROG;if(!weeks)return '';
  const ex=weeks[S.vidW]&&weeks[S.vidW][S.vidS]&&weeks[S.vidW][S.vidS].ex[S.vidE];if(!ex)return '';
  const id=ytId(ex.v);
  return `<div style="background:${C.wh};border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(25,18,17,.1)">
    <p style="font-weight:900;font-size:17px;color:${C.td};margin-bottom:3px">${esc(ex.n)}</p>
    <p style="font-size:12px;color:${C.tl};margin-bottom:14px">${esc(ex.m)}</p>
    ${id?`<div style="border-radius:11px;overflow:hidden;margin-bottom:14px;aspect-ratio:16/9"><iframe width="100%" height="100%" src="https://www.youtube.com/embed/${id}?end=20" frameBorder="0" allowFullscreen></iframe></div>`
    :`<div style="background:${C.bk};border-radius:13px;padding:34px 16px;text-align:center;margin-bottom:14px;border:1px solid #2a2523"><p style="font-size:36px;margin-bottom:10px">🎬</p><p style="font-weight:800;color:#fff;margin-bottom:5px">Video próximamente</p><p style="font-size:12px;color:${C.g2}">Tu entrenador agregará el video de demostración.</p></div>`}
    <div style="background:#fde8e8;border-radius:11px;padding:13px;border:1px solid #fecaca">
      <p style="font-weight:700;color:${C.dk};font-size:13px;margin-bottom:7px">💡 Puntos clave</p>
      <p style="font-size:12px;color:${C.tm};line-height:1.9;margin:0">· Activa el core antes de comenzar<br>· Controla la fase excéntrica (bajada lenta)<br>· Exhala en el momento de esfuerzo<br>· Columna en posición neutra</p>
    </div>
  </div>`;
}

function rMedidas(){
  let h=btnR('+ Registrar medidas',"set({view:'mform',mf:{},md:today(),mn:''})");
  if(S.meas.length===0){h+=card(`<div style="text-align:center;padding:26px 0"><p style="font-size:36px;margin-bottom:10px">📏</p><p style="font-weight:800;font-size:16px;color:${C.td};margin-bottom:4px">Sin medidas aún</p><p style="font-size:13px;color:${C.tl}">El progreso aparecerá aquí.</p></div>`,'margin-top:14px');}
  else{
    const l=S.meas[0],p=S.meas[1];
    h+=secT('Última medición · '+fmtDate(l.measurement_date));
    h+=card(`<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px 20px">${MF.filter(function(f){return l[f.k]!==null&&l[f.k]!==undefined&&l[f.k]!==''}).map(function(f){const d=p&&p[f.k]&&l[f.k]?parseFloat(l[f.k])-parseFloat(p[f.k]):null;return`<div><p style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:${C.tl};margin-bottom:2px">${f.l}</p><div style="display:flex;align-items:baseline;gap:3px"><span style="font-size:18px;font-weight:900;color:${C.td}">${l[f.k]}</span>${f.u?`<span style="font-size:11px;color:${C.tl}">${f.u}</span>`:''} ${d!==null&&d!==0?`<span style="font-size:10px;font-weight:700;color:${C.g2}">${d>0?'+':''}${d.toFixed(1)}</span>`:''}</div></div>`}).join('')}</div>${l.notes?`<p style="margin-top:11px;padding-top:11px;border-top:1px solid ${C.g3};font-size:12px;color:${C.tl};font-style:italic">"${esc(l.notes)}"</p>`:''}`);
    h+=secT('Historial');
    S.meas.forEach(function(e){
      const ex=S.expM===e.id;
      h+=`<div onclick="tM('${e.id}')" style="background:${C.wh};border-radius:12px;padding:12px 14px;margin-bottom:7px;cursor:pointer;box-shadow:0 1px 4px rgba(25,18,17,.07)"><div style="display:flex;justify-content:space-between;align-items:center"><div><p style="font-weight:700;font-size:14px;color:${C.td};margin-bottom:2px">${fmtDate(e.measurement_date)}</p><p style="font-size:12px;color:${C.tl}">${e.pecho?'📐 '+e.pecho+'cm':''}${e.cintura?' · 📏 '+e.cintura+'cm':''}</p></div><span style="color:${C.g3};font-size:13px">${ex?'▲':'▼'}</span></div>${ex?`<div style="margin-top:10px;padding-top:10px;border-top:1px solid ${C.g3};display:grid;grid-template-columns:1fr 1fr;gap:5px 14px">${MF.filter(function(f){return e[f.k]!==null&&e[f.k]!==undefined&&e[f.k]!==''}).map(function(f){return`<div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:${C.tl}">${f.l}</span><span style="font-size:12px;font-weight:700;color:${C.td}">${e[f.k]}${f.u?' '+f.u:''}</span></div>`}).join('')}${e.notes?`<p style="grid-column:1/-1;font-size:12px;color:${C.tl};font-style:italic;margin-top:3px">"${esc(e.notes)}"</p>`:''}</div>`:''}</div>`;
    });
  }
  return h;
}

function rMForm(){return `
<div style="background:${C.wh};border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(25,18,17,.1)">
  <p style="font-weight:900;font-size:18px;color:${C.td};margin-bottom:16px">📏 Registrar medidas</p>
  <p style="font-size:12px;color:${C.tl};margin-bottom:5px">Fecha</p>
  <input type="date" id="md-in" value="${today()}" max="${today()}" style="width:100%;padding:10px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:15px;outline:none;margin-bottom:14px;color:${C.td}"/>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px">
    ${MF.map(function(f){return`<div><p style="font-size:11px;color:${C.tl};margin-bottom:4px">${f.l}${f.u?' ('+f.u+')':''}</p><input type="number" step="0.1" placeholder="—" id="mf-${f.k}" value="${S.mf[f.k]||''}" style="width:100%;padding:9px 11px;border:2px solid ${C.g3};border-radius:9px;font-size:14px;outline:none;color:${C.td}"/></div>`}).join('')}
  </div>
  <p style="font-size:12px;color:${C.tl};margin-bottom:5px">Notas (opcional)</p>
  <textarea id="mn-in" placeholder="¿Cómo te sientes?" style="width:100%;padding:9px 13px;border:2px solid ${C.g3};border-radius:10px;font-size:13px;resize:none;min-height:60px;outline:none;margin-bottom:14px;color:${C.td}">${esc(S.mn)}</textarea>
  ${btnR('Guardar medidas','saveMed()')}
</div>`}

async function doLogin(){
  const email=document.getElementById('le')?document.getElementById('le').value.trim():'';
  const pass=document.getElementById('lp')?document.getElementById('lp').value:'';
  if(!email||!pass){set({error:'Completa todos los campos'});return}
  set({loading:true,error:''});
  const res=await sb.auth.signInWithPassword({email:email,password:pass});
  if(res.error){set({loading:false,error:'Correo o contraseña incorrectos'});return}
  S.user=res.data.user;
  await loadClientData();
}

async function loadClientData(){
  set({loading:true});
  const userId=S.user.id;
  const results=await Promise.all([
    sb.from('profiles').select('*').eq('id',userId).single(),
    sb.from('client_programs').select('program_id').eq('client_id',userId).maybeSingle(),
    sb.from('cycle_logs').select('*').eq('client_id',userId).order('created_at',{ascending:false}).limit(12),
    sb.from('symptom_logs').select('*').eq('client_id',userId).order('log_date',{ascending:false}).limit(30),
    sb.from('meno_logs').select('*').eq('client_id',userId).order('log_date',{ascending:false}).limit(30),
    sb.from('measurements').select('*').eq('client_id',userId).order('measurement_date',{ascending:false}).limit(12),
    sb.from('exercise_completions').select('exercise_id,set_number').eq('client_id',userId).eq('completed_on',today()),
  ]);
  const profile=results[0].data;
  const programId=results[1].data?results[1].data.program_id:null;
  let PROG=[],prog=null;
  if(programId){
    const pResults=await Promise.all([
      sb.from('programs').select('*').eq('id',programId).single(),
      sb.from('sessions').select('*').eq('program_id',programId).order('week_number').order('day_number'),
    ]);
    prog=pResults[0].data;
    const sessions=pResults[1].data||[];
    if(sessions.length>0){
      const sessIds=sessions.map(function(s){return s.id});
      const exRes=await sb.from('exercises').select('*').in('session_id',sessIds).order('order_index');
      const exercises=exRes.data||[];
      const sessionsWithEx=sessions.map(function(s){return Object.assign({},s,{exercises:exercises.filter(function(e){return e.session_id===s.id})})});
      prog=Object.assign({},prog,{sessions:sessionsWithEx});
      PROG=buildProg(prog);
    }
  }
  const cycleHistory=results[2].data||[];
  const lastBleeding=cycleHistory.length>0?cycleHistory[0].last_bleeding_date:null;
  const cycleLen=cycleHistory.length>0?cycleHistory[0].cycle_length:28;
  const symLog={};(results[3].data||[]).forEach(function(r){symLog[r.log_date]=r});
  const menoLog={};(results[4].data||[]).forEach(function(r){menoLog[r.log_date]=r});
  const completions={};(results[6].data||[]).forEach(function(r){completions[r.exercise_id+'_'+r.set_number]=true});
  set({loading:false,view:PROG.length===0?'no_prog':'main',profile:profile,prog:prog,PROG:PROG,cycleHistory:cycleHistory,lastBleeding:lastBleeding,cycleLen:cycleLen,symLog:symLog,menoLog:menoLog,meas:results[5].data||[],completions:completions});
}

function buildProg(prog){
  if(!prog||!prog.sessions)return [];
  const weeks=[];
  prog.sessions.forEach(function(s){if(weeks.indexOf(s.week_number)<0)weeks.push(s.week_number)});
  weeks.sort(function(a,b){return a-b});
  return weeks.map(function(wn){
    return prog.sessions.filter(function(s){return s.week_number===wn}).sort(function(a,b){return a.day_number-b.day_number}).map(function(sess){
      return {
        id:sess.id,week:wn,day:'Día '+sess.day_number,type:sess.session_type,
        ex:(sess.exercises||[]).sort(function(a,b){return a.order_index-b.order_index}).map(function(ex){
          return {eid:ex.id,n:ex.name,m:ex.muscle_group,sets:ex.sets_count,reps:ex.reps_range,v:ex.video_url||''}
        })
      }
    });
  });
}

async function saveCycleLen(len){
  if(!S.cycleHistory||!S.cycleHistory[0])return;
  await sb.from('cycle_logs').update({cycle_length:len}).eq('id',S.cycleHistory[0].id);
}

function goBack(){
  if(S.view==='vid')set({view:'sess'});
  else if(S.view==='sess')set({view:'main'});
  else set({view:'main'});
}

async function saveBleeding(){
  const d=document.getElementById('pd-in')?document.getElementById('pd-in').value:today();
  const res=await sb.from('cycle_logs').insert({client_id:S.user.id,last_bleeding_date:d,cycle_length:S.cycleLen}).select().single();
  if(res.data){
    const ch=[res.data].concat(S.cycleHistory).slice(0,12);
    set({cycleHistory:ch,lastBleeding:d,view:'main'});
  } else {
    set({view:'main'});
  }
}

function tSym(k){
  const s=S.selSym.includes(k)?S.selSym.filter(function(x){return x!==k}):[].concat(S.selSym,[k]);
  const n=document.getElementById('sn-in')?document.getElementById('sn-in').value:S.symNote;
  set({selSym:s,symNote:n});
}

async function saveSym(){
  const notes=document.getElementById('sn-in')?document.getElementById('sn-in').value:'';
  const entry={client_id:S.user.id,log_date:today(),symptoms:S.selSym,notes:notes};
  const res=await sb.from('symptom_logs').upsert(entry,{onConflict:'client_id,log_date'}).select().single();
  const sl=Object.assign({},S.symLog);
  if(res.data)sl[today()]=res.data;
  set({symLog:sl,view:'main',selSym:[],symNote:''});
}

async function saveMeno(){
  const entry={client_id:S.user.id,log_date:today(),
    energia:document.getElementById('mq1')?document.getElementById('mq1').value:'',
    sueno:document.getElementById('mq2')?document.getElementById('mq2').value:'',
    emocional:document.getElementById('mq3')?document.getElementById('mq3').value:'',
    tratamiento:document.getElementById('mtrat')?document.getElementById('mtrat').value:''};
  const res=await sb.from('meno_logs').upsert(entry,{onConflict:'client_id,log_date'}).select().single();
  const ml=Object.assign({},S.menoLog);
  if(res.data)ml[today()]=res.data;
  set({menoLog:ml,view:'main'});
}

async function tSet(eid,i,sets){
  const k=eid+'_'+i;
  const comp=Object.assign({},S.completions);
  comp[k]=!comp[k];
  S.completions=comp;
  const done=comp[k];
  if(done){
    await sb.from('exercise_completions').upsert({client_id:S.user.id,exercise_id:eid,set_number:i,completed_on:today()},{onConflict:'client_id,exercise_id,set_number,completed_on'});
  } else {
    await sb.from('exercise_completions').delete().eq('client_id',S.user.id).eq('exercise_id',eid).eq('set_number',i).eq('completed_on',today());
  }
  const b=document.getElementById('sb-'+eid+'-'+i);
  if(b){b.style.background=done?C.pr:C.wh;b.style.borderColor=done?C.pr:C.g3;b.style.color=done?C.wh:C.tl;b.textContent=done?'✓':'S'+(i+1)}
  const allD=Array.from({length:sets},function(_,j){return comp[eid+'_'+j]}).every(Boolean);
  const ec=document.getElementById('ec-'+eid);if(ec){ec.style.background=allD?'#1a0a09':C.wh;ec.style.borderColor=allD?C.pr:'transparent'}
  const nb=document.getElementById('nb-'+eid);if(nb){nb.style.background=allD?C.pr:'#fde8e8';nb.style.color=allD?C.wh:C.dk;if(allD)nb.textContent='✓'}
}

function tM(id){set({expM:S.expM===id?null:id})}

async function saveMed(){
  const date=document.getElementById('md-in')?document.getElementById('md-in').value:today();
  const notes=document.getElementById('mn-in')?document.getElementById('mn-in').value:'';
  const fd={client_id:S.user.id,measurement_date:date,notes:notes};
  MF.forEach(function(f){const el=document.getElementById('mf-'+f.k);const v=el?el.value:'';if(v!==''&&v!==undefined)fd[f.k]=parseFloat(v)});
  const res=await sb.from('measurements').insert(fd).select().single();
  if(res.data)set({meas:[res.data].concat(S.meas),view:'main'});
  else set({view:'main'});
}

async function doLogout(){await sb.auth.signOut();set({view:'login',user:null,profile:null,PROG:[],completions:{}})}

window.set=set;window.doLogin=doLogin;window.doLogout=doLogout;window.goBack=goBack;
window.saveBleeding=saveBleeding;window.tSym=tSym;window.saveSym=saveSym;
window.saveMeno=saveMeno;window.tSet=tSet;window.tM=tM;window.saveMed=saveMed;window.today=today;

async function init(){
  try{
    const res=await sb.auth.getSession();
    if(res.data&&res.data.session){S.user=res.data.session.user;await loadClientData();}
    else render();
  }catch(e){render();}
}
init();
</script>
</body>
